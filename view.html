<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAERO | Sipariş Detayı</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#07111d,#18314a 55%,#384b61);
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:50px 6%;
}

.card{
  width:100%;
  max-width:680px;
  background:rgba(8,18,30,.82);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:40px;
  box-shadow:0 24px 80px rgba(0,0,0,.35);
}

.logo{
  font-family:"Oswald",Arial,sans-serif;
  font-size:40px;
  letter-spacing:6px;
  margin-bottom:8px;
}

.kicker{
  color:#e6d7b0;
  font-size:13px;
  letter-spacing:1px;
  margin-bottom:28px;
}

h1{
  font-family:"Oswald",Arial,sans-serif;
  font-size:38px;
  line-height:115%;
  margin-bottom:22px;
}

.row{
  padding:16px 0;
  border-bottom:1px solid rgba(255,255,255,.10);
}

.label{
  color:rgba(255,255,255,.48);
  font-size:13px;
  margin-bottom:6px;
}

.value{
  color:#fff;
  font-size:17px;
  line-height:26px;
  word-break:break-word;
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(230,215,176,.14);
  color:#e6d7b0;
  font-size:13px;
}

.notice{
  margin-top:26px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,.07);
  color:rgba(255,255,255,.65);
  font-size:14px;
  line-height:24px;
}

.loading{
  color:rgba(255,255,255,.65);
  font-size:16px;
}

.error{
  color:#e6d7b0;
  font-size:16px;
  line-height:26px;
}

@media(max-width:700px){
  .card{padding:30px 22px;border-radius:20px}
  h1{font-size:32px}
  .logo{font-size:34px}
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">
    <div class="logo">VAERO</div>
    <div class="kicker">SİPARİŞ DETAYI</div>

    <h1>Formdan gelen sipariş.</h1>

    <div id="content" class="loading">Sipariş bilgileri yükleniyor...</div>

    <div class="notice">
      Bu ekran yalnızca WhatsApp üzerinden gelen kişiye özel sipariş linki için hazırlanmıştır.
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wpfiszzxlwkmaqcqmywa.supabase.co";
const SUPABASE_KEY = "sb_publishable_eTspasegbb8PbX2hEGMD5w_ggrWRuYN";

function safe(v){ return v ? String(v) : "-"; }

function row(label,value){
  return <div class="row"><div class="label">${label}</div><div class="value">${safe(value)}</div></div>;
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function loadOrder(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get("order");
  const content = document.getElementById("content");

  if(!id){
    content.className = "error";
    content.innerText = "Sipariş ID bulunamadı.";
    return;
  }

  let data = null;

  for(let i = 0; i < 4; i++){
    try{
      const res = await fetch(SUPABASE_URL + "/rest/v1/orders?id=eq." + encodeURIComponent(id) + "&select=*", {
        method:"GET",
        headers:{
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      });

      const json = await res.json();

      if(json && json[0]){
        data = json[0];
        break;
      }
    }catch(e){}

    await wait(900);
  }

  if(!data){
    content.className = "error";
    content.innerText = "Sipariş bilgileri yüklenirken hata oluştu. Lütfen sayfayı yenileyin.";
    return;
  }

  content.className = "";
  content.innerHTML = `
    ${row("Müşteri", data.name)}
    ${row("Telefon", data.phone)}
    ${row("Ürün", data.product)}
    ${row("İlk koku", data.scent)}
    ${row("Ek koku", data.extra_scent)}
    ${row("Adet", data.quantity)}
    ${row("Bölge / Şehir", data.region)}
    ${row("Adres", data.address)}
    ${row("Ek not", data.note)}
    ${row("Sipariş durumu", data.status)}
    ${row("Tarih", data.created_at)}
    <div class="badge">VAERO Order ID: ${safe(data.id)}</div>
  `;
}

loadOrder();
</script>

</body>
</html>
